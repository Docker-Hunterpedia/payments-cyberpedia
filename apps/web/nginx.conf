# NOTE: nginx `add_header` inheritance — a location with ANY add_header drops
# every server-level one, so the security set is repeated in both locations.

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/css application/javascript application/json image/svg+xml;

  # Hashed build assets never change — cache forever.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
    try_files $uri =404;
  }

  # SPA fallback: every route serves index.html, which must not be cached
  # so deploys show up immediately.
  location / {
    add_header Cache-Control "no-cache";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://api.pay.cyberpedia.site; img-src 'self' data:; style-src 'self' 'unsafe-inline'; font-src 'self'; script-src 'self'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;
    try_files $uri $uri/ /index.html;
  }
}
