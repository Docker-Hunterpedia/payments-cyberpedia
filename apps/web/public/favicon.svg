<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a7683" />
      <stop offset="1" stop-color="#0e4750" />
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="15" fill="url(#bg)" />
  <!-- C monogram: open ring, mouth on the right -->
  <path
    d="M 44.1 21.3 A 16.5 16.5 0 1 0 44.1 42.7"
    fill="none"
    stroke="#ffffff"
    stroke-width="8"
    stroke-linecap="round"
  />
  <!-- coin entering the C's mouth -->
  <circle cx="45.5" cy="32" r="6.5" fill="#6fd39e" />
</svg>
