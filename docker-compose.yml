services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cyberpedia
      POSTGRES_PASSWORD: cyberpedia
      POSTGRES_DB: cyberpedia_payments
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cyberpedia -d cyberpedia_payments']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
